name: dbt ETL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '*/15 * * * *'

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          python -m pip install dbt-core~=1.11.0 dbt-snowflake~=1.11.0

      - name: Write dbt profile
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          mkdir -p ~/.dbt
          python - <<'PY'
          import os, textwrap

          key = os.environ['SNOWFLAKE_PRIVATE_KEY']
          profile = textwrap.dedent("""\
              airbnb:
                outputs:
                  dev:
                    type: snowflake
                    account: "{account}"
                    user: "{user}"
                    role: "{role}"
                    private_key: |
                      {key}
                    private_key_passphrase: "{passphrase}"
                    database: "{database}"
                    schema: "{schema}"
                    warehouse: "{warehouse}"
                    threads: 1
              target: dev
          """).format(
              account=os.environ['SNOWFLAKE_ACCOUNT'],
              user=os.environ['SNOWFLAKE_USER'],
              role=os.environ['SNOWFLAKE_ROLE'],
              key=textwrap.indent(key, ' ' * 10),
              passphrase=os.environ['SNOWFLAKE_PRIVATE_KEY_PASSPHRASE'],
              database=os.environ['SNOWFLAKE_DATABASE'],
              schema=os.environ['SNOWFLAKE_SCHEMA'],
              warehouse=os.environ['SNOWFLAKE_WAREHOUSE'],
          )
          with open(os.path.expanduser('~/.dbt/profiles.yml'), 'w') as f:
              f.write(profile)
          PY

      - name: Run full dbt ETL
        working-directory: airbnb
        env:
          DBT_PROFILES_DIR: ~/.dbt
        run: |
          dbt seed
          dbt run
          dbt test
