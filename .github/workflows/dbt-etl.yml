name: dbt ETL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '*/15 * * * *'

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          python -m pip install dbt-core~=1.11.0 dbt-snowflake~=1.11.0

      - name: Write dbt profile
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          mkdir -p ~/.dbt
          python - <<'PY'
          import os
          from pathlib import Path

          def normalize_secret(value: str) -> str:
              value = value.replace('\r\n', '\n').replace('\r', '\n')
              if '\\n' in value and '-----BEGIN ' in value:
                  value = value.replace('\\n', '\n')
              return value.strip() + '\n'

          key = normalize_secret(os.environ['SNOWFLAKE_PRIVATE_KEY'])
          lines = [
              'airbnb:',
              '  outputs:',
              '    dev:',
              '      type: snowflake',
              f'      account: "{os.environ["SNOWFLAKE_ACCOUNT"]}"',
              f'      user: "{os.environ["SNOWFLAKE_USER"]}"',
              f'      role: "{os.environ["SNOWFLAKE_ROLE"]}"',
              '      private_key: |',
          ]
          lines.extend(f'        {line}' for line in key.splitlines())
          lines.extend([
              f'      private_key_passphrase: "{os.environ["SNOWFLAKE_PRIVATE_KEY_PASSPHRASE"]}"',
              f'      database: "{os.environ["SNOWFLAKE_DATABASE"]}"',
              f'      schema: "{os.environ["SNOWFLAKE_SCHEMA"]}"',
              f'      warehouse: "{os.environ["SNOWFLAKE_WAREHOUSE"]}"',
              '      threads: 1',
              '  target: dev',
              ''
          ])
          Path(Path.home(), '.dbt', 'profiles.yml').write_text('\n'.join(lines))
          PY

      - name: Run full dbt ETL
        working-directory: airbnb
        run: |
          export DBT_PROFILES_DIR="$HOME/.dbt"
          dbt deps
          dbt seed
          dbt run
          dbt test
